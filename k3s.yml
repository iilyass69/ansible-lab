---
- name: Migration vers Kubernetes (Nettoyage Docker et Installation K3s)
  hosts: azure_vm
  become: yes

  tasks:
    - name: 🛑 1. Arrêter les services Docker et retirer les conteneurs
      ansible.builtin.shell: |
        docker rm -f $(docker ps -aq) || true
        systemctl stop docker || true
        systemctl disable docker || true
      ignore_errors: yes

    - name: 🗑️ 2. Désinstaller Docker de la machine
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: absent
        purge: yes

    - name: 🧹 3. Supprimer les fichiers résiduels de Docker
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /var/lib/docker
        - /etc/docker

    - name: 🚀 4. Télécharger et installer K3s (Kubernetes allégé)
      ansible.builtin.shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s

    - name: ⚙️ 5. Donner les droits à l'utilisateur Azure pour utiliser kubectl
      ansible.builtin.shell: |
        mkdir -p /home/azureuser/.kube
        cp /etc/rancher/k3s/k3s.yaml /home/azureuser/.kube/config
        chown -R azureuser:azureuser /home/azureuser/.kube
        chmod 600 /home/azureuser/.kube/config

     - name: 📁 6. Créer le dossier k8s sur la VM Azure
      ansible.builtin.file:
        path: /home/azureuser/k8s
        state: directory
        mode: '0755'

    - name: 📄 7. Copier les fichiers YAML Kubernetes vers la VM
      ansible.builtin.copy:
        src: k8s/
        dest: /home/azureuser/k8s/

    - name: 📦 8. Appliquer les configurations sur le cluster Kubernetes
      ansible.builtin.shell: |
        export KUBECONFIG=/home/azureuser/.kube/config
        kubectl apply -f /home/azureuser/k8s/nginx-deployment.yml
        kubectl apply -f /home/azureuser/k8s/nginx-service.yml
